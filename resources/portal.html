<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WiFi Setup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f5f7;color:#1a1a1a;line-height:1.5;padding:16px;max-width:420px;margin:0 auto}
h1{font-size:1.4rem;text-align:center;padding:18px 0 12px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:16px;margin-bottom:14px}
.card h2{font-size:.95rem;color:#555;margin-bottom:10px}
button{cursor:pointer;border:none;border-radius:8px;padding:10px 16px;font-size:.9rem;transition:opacity .15s}
button:disabled{opacity:.5;cursor:default}
.btn-primary{background:#2563eb;color:#fff;width:100%}
.btn-sm{background:#e5e7eb;color:#333;padding:6px 12px;font-size:.8rem}
.net-list{list-style:none;max-height:220px;overflow-y:auto}
.net-item{display:flex;align-items:center;justify-content:space-between;padding:10px 8px;border-bottom:1px solid #f0f0f0;cursor:pointer;border-radius:6px}
.net-item:hover{background:#f0f4ff}
.net-ssid{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.net-icons{display:flex;gap:6px;font-size:.85rem;color:#888;flex-shrink:0}
.scan-msg{text-align:center;color:#888;padding:18px 0;font-size:.9rem}
label{display:block;font-size:.85rem;color:#555;margin-bottom:4px;margin-top:10px}
input[type="text"],input[type="password"]{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-size:.9rem;outline:none}
input:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
input[readonly]{background:#f4f5f7;color:#555}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle-link{background:none;color:#2563eb;padding:0;font-size:.85rem;text-decoration:underline}
.pwd-wrap{position:relative}
.pwd-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;color:#888;font-size:.85rem;padding:4px}
#status{text-align:center;font-size:.9rem;padding:8px 0;min-height:1.5em}
.status-ok{color:#16a34a}
.status-err{color:#dc2626}
.status-info{color:#555}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
</style>
</head>
<body>
<h1>WiFi Setup</h1>

<div class="card">
  <div class="hdr-row">
    <h2>Available Networks</h2>
    <button class="btn-sm" id="btnRefresh" type="button">Refresh</button>
  </div>
  <div id="netArea"><p class="scan-msg">Scanning&#8230;</p></div>
</div>

<div class="card">
  <form id="wifiForm" autocomplete="off">
    <div class="toggle-row">
      <label for="ssid" style="margin-top:0">SSID</label>
      <button type="button" class="toggle-link" id="btnManual">Enter manually</button>
    </div>
    <input type="text" id="ssid" name="ssid" readonly placeholder="Select a network above" required>

    <label for="password">Password</label>
    <div class="pwd-wrap">
      <input type="password" id="password" name="password" placeholder="Enter password">
      <button type="button" class="pwd-toggle" id="btnEye" aria-label="Toggle password visibility">&#9673;</button>
    </div>

    <div style="margin-top:14px">
      <button type="submit" class="btn-primary" id="btnConnect" disabled>Connect</button>
    </div>
  </form>
  <div id="status"></div>
</div>

<script>
(function(){
  var ssidEl=document.getElementById('ssid');
  var pwdEl=document.getElementById('password');
  var btnConnect=document.getElementById('btnConnect');
  var btnRefresh=document.getElementById('btnRefresh');
  var btnManual=document.getElementById('btnManual');
  var btnEye=document.getElementById('btnEye');
  var netArea=document.getElementById('netArea');
  var statusEl=document.getElementById('status');
  var form=document.getElementById('wifiForm');
  var manual=false;

  function signalBars(rssi){
    if(rssi>=-50) return '\u2582\u2584\u2586\u2588';
    if(rssi>=-65) return '\u2582\u2584\u2586';
    if(rssi>=-75) return '\u2582\u2584';
    return '\u2582';
  }

  function setStatus(msg,cls){
    statusEl.textContent=msg;
    statusEl.className=cls||'';
  }

  function updateBtn(){
    btnConnect.disabled=!ssidEl.value.trim();
  }

  function renderNetworks(nets){
    if(!nets||!nets.length){
      netArea.innerHTML='<p class="scan-msg">No networks found</p>';
      return;
    }
    var ul=document.createElement('ul');
    ul.className='net-list';
    nets.sort(function(a,b){return(b.rssi||0)-(a.rssi||0);});
    nets.forEach(function(n){
      var li=document.createElement('li');
      li.className='net-item';
      li.setAttribute('tabindex','0');
      li.setAttribute('role','button');
      var span=document.createElement('span');
      span.className='net-ssid';
      span.textContent=n.ssid||'(hidden)';
      var icons=document.createElement('span');
      icons.className='net-icons';
      icons.textContent=signalBars(n.rssi)+(n.secure?' \uD83D\uDD12':'');
      li.appendChild(span);
      li.appendChild(icons);
      function pick(){
        ssidEl.value=n.ssid||'';
        ssidEl.readOnly=true;
        manual=false;
        btnManual.textContent='Enter manually';
        pwdEl.focus();
        updateBtn();
      }
      li.addEventListener('click',pick);
      li.addEventListener('keydown',function(e){if(e.key==='Enter')pick();});
      ul.appendChild(li);
    });
    netArea.innerHTML='';
    netArea.appendChild(ul);
  }

  function scan(){
    netArea.innerHTML='<p class="scan-msg">Scanning&#8230;</p>';
    fetch('/scan').then(function(r){return r.json();}).then(function(d){
      renderNetworks(d);
    }).catch(function(){
      netArea.innerHTML='<p class="scan-msg">Scan failed</p>';
    });
  }

  btnRefresh.addEventListener('click',scan);

  btnManual.addEventListener('click',function(){
    manual=!manual;
    if(manual){
      ssidEl.readOnly=false;
      ssidEl.placeholder='Enter SSID';
      ssidEl.value='';
      ssidEl.focus();
      btnManual.textContent='Select from list';
    }else{
      ssidEl.readOnly=true;
      ssidEl.placeholder='Select a network above';
      ssidEl.value='';
      btnManual.textContent='Enter manually';
    }
    updateBtn();
  });

  ssidEl.addEventListener('input',updateBtn);

  btnEye.addEventListener('click',function(){
    var show=pwdEl.type==='password';
    pwdEl.type=show?'text':'password';
    btnEye.innerHTML=show?'\u25CE':'\u25C9';
  });

  form.addEventListener('submit',function(e){
    e.preventDefault();
    var s=ssidEl.value.trim();
    if(!s) return;
    btnConnect.disabled=true;
    ssidEl.disabled=true;
    pwdEl.disabled=true;
    setStatus('Connecting to '+s+'...','status-info');
    var body='ssid='+encodeURIComponent(s)+'&password='+encodeURIComponent(pwdEl.value);
    fetch('/connect',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:body
    }).then(function(r){return r.json();}).then(function(d){
      if(d.success){
        setStatus(d.message||'Connected!','status-ok');
      }else{
        setStatus(d.message||'Connection failed','status-err');
        ssidEl.disabled=false;
        pwdEl.disabled=false;
        updateBtn();
      }
    }).catch(function(){
      setStatus('Request failed — check device','status-err');
      ssidEl.disabled=false;
      pwdEl.disabled=false;
      updateBtn();
    });
  });

  scan();
})();
</script>
</body>
</html>
